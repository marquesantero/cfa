name: CFA Governance Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install CFA
        run: pip install -e ".[dev]"
      - name: Evaluate safe intent
        run: cfa evaluate "Join NFe with Clientes and persist to Silver" --exit-code
      - name: Evaluate with compliance bundle
        run: cfa evaluate "Join NFe with Clientes persist Silver" --policy-bundle policies/compliance-strict-v1.yaml --format summary
      - name: List rules
        run: cfa rules list
      - name: List backends
        run: cfa backend list
      - name: Generate compliance report
        if: always()
        run: cfa report compliance --policy-bundle compliance-strict-v1.0 --output cfa_compliance_report.html
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cfa-compliance-report
          path: cfa_compliance_report.html
